<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <title>Tehtävälista</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
      }

      h1 {
        text-align: center;
      }

      .syotto {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
      }

      button {
        padding: 10px 15px;
        cursor: pointer;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: left;
      }

      th {
        background: #f0f0f0;
      }

      .poista {
        background: red;
        color: white;
        border: none;
        padding: 6px 12px;
      }
    </style>
  </head>
  <body>
    <h1>Tehtävälista</h1>

    <div class="syotto">
      <input id="tehtavaInput" type="text" placeholder="Kirjoita tehtävä" />
      <button onclick="lisaaTehtava()">Lisää</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Tehtävä</th>
          <th>Toiminto</th>
        </tr>
      </thead>
      <tbody id="tehtavaTaulukko"></tbody>
    </table>
    <script>
     let tehtavat = [];

function lisaaTehtava() {
    const input = document.getElementById("tehtavaInput");
    if (input.value !== "") {
        tehtavat.push(input.value);
        input.value = "";
        listaaTehtavat();
    }
}

function poistaTehtava(i) {
    tehtavat.splice(i, 1);
    listaaTehtavat();
}

function listaaTehtavat() {
    const lista = document.getElementById("tehtavaTaulukko");
    lista.innerHTML = ""; 
    
    tehtavat.forEach((t, i) => {
        lista.innerHTML += `
            <tr>
                <td>${i + 1}</td>
                <td>${t}</td>
                <td><button class="poista" onclick="poistaTehtava(${i})">Poista</button></td>
            </tr>`;
    });
}
    </script>
  </body>
</html>
